<!DOCTYPE html>
<html>
<head>
  <title>Diary Zaskya</title>
  <style>
    body {
      background: linear-gradient(to right, #ff9a9e, #fecfef);
      font-family: Arial;
      text-align: center;
      color: #333;
      padding: 20px;
      transition: 0.3s;
    }
    h1 {
      color: #ff1493;
      text-shadow: 2px 2px 4px white;
    }
    .kotak {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin: 20px auto;
      max-width: 400px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }
    button {
      background: #ff69b4;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin: 5px;
    }
    input {
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ff69b4;
      margin: 5px;
    }
    
    /* DARK MODE CSS */
    .dark-mode {
      background: linear-gradient(to right, #232526, #414345);
      color: white;
    }
    .dark-mode h1 {
      color: #00ffff;
      text-shadow: 2px 2px 4px #ff1493;
    }
    .dark-mode .kotak {
      background: #333;
      color: white;
      box-shadow: 0 0 20px rgba(0,255,255,0.3);
    }
    .dark-mode button {
      background-color: #00ffff;
      color: black;
    }
    .dark-mode input {
      background: #555;
      color: white;
      border: 1px solid #00ffff;
    }
  </style>
</head>
<body>
  <h1>✨Diary Zaskya✨</h1>
  <button onclick="gantiMode()" id="tombolMode">🌙 Dark Mode</button>
  
  <div class="kotak">
    <h2>Kalkulator Nilai 📚</h2>
    <input type="number" id="nilai" placeholder="Masukin nilai 0-100">
    <button onclick="cekNilai()">Cek Hasil</button>
    <p id="hasil"></p>
  </div>

  <div class="kotak">
    <h2>Game Tebak Angka 🎮</h2>
    <p>Aku mikirin angka 1-10. Tebak ya!</p>
    <input type="number" id="tebakan" placeholder="Tebak 1-10">
    <button onclick="cekTebakan()">Tebak</button>
    <p id="hasilTebak"></p>
  </div>

<script>
  // KODE DARK MODE
  function gantiMode() {
    var body = document.body;
    var tombol = document.getElementById("tombolMode");
    body.classList.toggle("dark-mode");
    if (body.classList.contains("dark-mode")) {
      tombol.innerHTML = "☀️ Light Mode";
    } else {
      tombol.innerHTML = "🌙 Dark Mode";
    }
  }

  // KODE KALKULATOR NILAI
  function cekNilai() {
    var nilai = document.getElementById("nilai").value;
    var hasil = document.getElementById("hasil");
    if (nilai == "") {
      hasil.innerHTML = "Isi nilainya dulu dong 😭";
    } else if (nilai >= 90) {
      hasil.innerHTML = "WOHHH NILAI A! Zaskya jenius 😭🔥";
    } else if (nilai >= 80) {
      hasil.innerHTML = "Nilai B! Keren banget 💖";
    } else if (nilai >= 70) {
      hasil.innerHTML = "Nilai C! Dikit lagi A semangat 💪";
    } else {
      hasil.innerHTML = "Belajar lagi ya, kamu pasti bisa 💪✨";
    }
  }

  // KODE GAME TEBAK ANGKA
  var angkaRahasia = Math.floor(Math.random() * 10) + 1;
  function cekTebakan() {
    var tebakan = document.getElementById("tebakan").value;
    var hasilTebak = document.getElementById("hasilTebak");
    if (tebakan == "") {
      hasilTebak.innerHTML = "Tebak dulu dong angkanya 😭";
    } else if (tebakan == angkaRahasia) {
      hasilTebak.innerHTML = "BENER BANGET! Kamu dukun ya 😭🔥";
      angkaRahasia = Math.floor(Math.random() * 10) + 1;
    } else if (tebakan > angkaRahasia) {
      hasilTebak.innerHTML = "Kegedean! Coba lebih kecil 👇";
    } else {
      hasilTebak.innerHTML = "Kekecilan! Coba lebih gede 👆";
    }
  }
</script>

</body>
</html>
