<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator Zaskya 🔥</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .kalkulator {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 300px;
    }
    .judul {
      text-align: center;
      color: #764ba2;
      margin-bottom: 15px;
    }
    #layar {
      width: 100%;
      height: 60px;
      font-size: 28px;
      text-align: right;
      padding: 10px;
      border: none;
      background: #f0f0f0;
      border-radius: 10px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }
    .tombol-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    button {
      padding: 20px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #f0f0f0;
      transition: 0.2s;
    }
    button:hover {
      background: #ddd;
    }
    .operator {
      background: #667eea;
      color: white;
    }
    .operator:hover {
      background: #764ba2;
    }
    .sama-dengan {
      background: #ff6b6b;
      color: white;
      grid-column: span 2;
    }
    .sama-dengan:hover {
      background: #ee5a6f;
    }
    .clear {
      background: #ffa500;
      color: white;
    }
    .back-home {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #764ba2;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="kalkulator">
    <h2 class="judul">🧮 Kalkulator Zaskya</h2>
    <input type="text" id="layar" disabled>
    
    <div class="tombol-grid">
      <button class="clear" onclick="clearLayar()">C</button>
      <button class="operator" onclick="tambahKeLayar('/')">÷</button>
      <button class="operator" onclick="tambahKeLayar('*')">×</button>
      <button class="operator" onclick="hapusSatu()">⌫</button>
      
      <button onclick="tambahKeLayar('7')">7</button>
      <button onclick="tambahKeLayar('8')">8</button>
      <button onclick="tambahKeLayar('9')">9</button>
      <button class="operator" onclick="tambahKeLayar('-')">-</button>
      
      <button onclick="tambahKeLayar('4')">4</button>
      <button onclick="tambahKeLayar('5')">5</button>
      <button onclick="tambahKeLayar('6')">6</button>
      <button class="operator" onclick="tambahKeLayar('+')">+</button>
      
      <button onclick="tambahKeLayar('1')">1</button>
      <button onclick="tambahKeLayar('2')">2</button>
      <button onclick="tambahKeLayar('3')">3</button>
      <button onclick="tambahKeLayar('.')">.</button>
      
      <button onclick="tambahKeLayar('0')" style="grid-column: span 2;">0</button>
      <button class="sama-dengan" onclick="hitung()">=</button>
    </div>
    
    <a href="index.html" class="back-home">← Balik ke Home</a>
  </div>

  <script>
    let layar = document.getElementById('layar');
    
    function tambahKeLayar(input) {
      layar.value += input;
    }
    
    function clearLayar() {
      layar.value = '';
    }
    
    function hapusSatu() {
      layar.value = layar.value.slice(0, -1);
    }
    
    function hitung() {
      try {
        layar.value = eval(layar.value);
      } catch {
        layar.value = 'Error 😭';
        setTimeout(clearLayar, 1500);
      }
    }
  </script>
</body>
</html>
