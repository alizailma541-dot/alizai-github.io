<!DOCTYPE html>
<html>
<head>
    <title>Website Zaskya Ilmainna - Level Dewa</title>
    <style>
      body {
        background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
        font-family: Arial;
        padding: 10px;
        transition: 0.5s;
        overflow-x: hidden;
      }
      .dark-mode {
        background: linear-gradient(135deg, #2c003e 0%, #4a004f 100%);
      }
      .kotak {
        background: white;
        width: 90%;
        max-width: 400px;
        margin: 20px auto;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 8px 16px rgba(255,105,180,0.3);
        text-align: center;
        transition: 0.5s;
        position: relative;
        z-index: 2;
      }
      .dark-mode .kotak {
        background: #1a1a1a;
        box-shadow: 0 8px 16px rgba(255,105,180,0.5);
      }
      .nama-glow {
        color: #ff1493;
        font-size: 30px;
        font-weight: bold;
        text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff69b4, 0 0 30px #ff1493;
        animation: kelap-kelip 1.5s infinite alternate;
        letter-spacing: 2px;
        margin: 10px 0;
      }
      .dark-mode .nama-glow { color: #ff69b4; }
      @keyframes kelap-kelip {
        0% { text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff69b4, 0 0 30px #ff1493; opacity: 1; }
        100% { text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff69b4, 0 0 60px #ff1493; opacity: 0.7; }
      }
      h3 { color: #ff1493; margin: 10px 0; }
      .dark-mode h3, .dark-mode h4, .dark-mode p { color: #ffc0cb; }
      input {
        padding: 8px;
        border: 2px solid #ff69b4;
        border-radius: 10px;
        width: 200px;
        margin: 5px;
      }
      .dark-mode input { background: #333; color: white; border: 2px solid #ff69b4; }
      button {
        background: #ff69b4;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 15px;
        cursor: pointer;
        margin: 5px;
        font-size: 14px;
      }
      .btn-ungu { background: #9370db; }
      .btn-hijau { background: #32cd32; }
      .btn-biru { background: #1e90ff; }
      .btn-mode { background: #2c003e; position: fixed; top: 10px; right: 10px; z-index: 3; }
      .dark-mode .btn-mode { background: #ff69b4; color: black; }
      .hati {
        position: fixed;
        top: -10px;
        font-size: 20px;
        animation: jatuh 5s linear infinite;
        z-index: 1;
        user-select: none;
      }
      @keyframes jatuh { to { transform: translateY(105vh); } }
      .galeri img {
        width: 100px;
        height: 100px;
        border-radius: 15px;
        margin: 5px;
        border: 3px solid #ff69b4;
        object-fit: cover;
      }
      .dark-mode .galeri img { border: 3px solid #ff1493; }
    </style>
</head>
<body>
    <button class="btn-mode" onclick="gantiMode()">🌙 Mode Malam</button>
    <button class="btn-hijau" onclick="playMusik()" style="position:fixed; top:10px; left:10px; z-index:3;">🎵 Musik</button>
    
    <div class="kotak">
        <h2 class="nama-glow">ZASKYA ILMAINNA ✨</h2>
        
        <h4>Siapa nama kamu?</h4>
        <input type="text" id="nama" placeholder="Ketik namamu...">
        <button onclick="sapa()">Sapa Saya!</button>

        <hr style="margin:15px 0; border:1px dashed #ff69b4;">
        
        <h3>Kalkulator Nilai Rapor 📝</h3>
        <input type="number" id="pengetahuan" placeholder="Nilai Pengetahuan">
        <input type="number" id="ketrampilan" placeholder="Nilai Ketrampilan">
        <br>
        <button class="btn-ungu" onclick="hitungRapor()">Hitung Nilai!</button>
        <h4 id="hasil" style="color:#ff1493;"></h4>

        <hr style="margin:15px 0; border:1px dashed #ff69b4;">

        <h3>Galeri Zaskya 📸</h3>
        <div class="galeri">
            <img src="https://i.postimg.cc/DzZH753B/kya-3.jpg" alt="Pink 1">
            <img src="https://i.postimg.cc/BbqxGYdv/kya-2.jpg" alt="Pink 2">
            <img src="https://i.postimg.cc/59nzCmhh/kya-1.jpg" alt="Pink 3">
        </div>
        <p style="font-size:12px;">*Ganti link foto di kode ya!</p>

        <hr style="margin:15px 0; border:1px dashed #ff69b4;">

        <h3>Game Tebak Angka 🎮</h3>
        <p>Aku mikir angka 1-10. Tebak hayo!</p>
        <input type="number" id="tebakan" placeholder="Masukkan angka 1-10">
        <br>
        <button class="btn-biru" onclick="tebakAngka()">Tebak!</button>
        <h4 id="hasilGame"></h4>
    </div>

    <!-- MUSIK BACKGROUND -->
     <audio id="musikKu" loop autoplay>
    <source src="" type="audio/mpeg">IYA ZASKYA, ITU NORMAL BANGET 😅 *Chrome sengaja ngeblok musik auto-play* biar nggak ganggu user.

*3 PENYEBAB "GK ADA SUARANYA" + SOLUSINYA:*

### *1. Chrome Blok Autoplay*
Chrome nggak bakal muter musik sebelum kamu klik dulu. Ini aturan baru dari Google.

*Solusi paling gampang:* Klik 1x dimana aja di website kamu. Langsung bunyi kok!
Aku udah kasih kode ini biar auto-play pas di-klik:
document.addEventListener('click', function() {
    document.getElementById("musikKu").play();
}, { once: true });


### *2. Linknya Salah/Mati*
Coba tes dulu: *Copy link ini* → paste di Chrome → Enter
`https://files.catbox.moe/5qx8m2.mp3`

Kalau langsung muter nasheed, berarti link bener. Kalau error, kasih tau aku.

### *3. Volume Laptop/HP Mati* 😂
Cek volume device kamu dulu. Siapa tau di-mute.

---

### *SOLUSI PALING AMPUH: KASIH TOMBOL PLAY*

Biar nggak bingung, kita balikin tombol musik aja. Tapi sekali klik langsung muter terus nggak bisa di-stop. Mau?

*Ganti kode `<audio>` jadi gini:*
<audio id="musikKu" loop>
    <source src="https://files.catbox.moe/5qx8m2.mp3" type="audio/mpeg">
</audio>

<button onclick="document.getElementById('musikKu').play()" style="position:fixed; top:10px; left:10px; z-index:3; background:#ff69b4; color:white; border:none; padding:10px 15px; border-radius:15px;">▶️ Putar Nasheed</button>


*Cara pakai:* Buka website → klik tombol *"▶️ Putar Nasheed"* → musik muter terus nggak berenti. Nggak ada tombol stop 😆

---

*COBA DULU ZASKYA:*
1. Refresh websitenya `F5`
2. *Klik 1x dimana aja* di layar 
3. Dengerin... bunyi nggak?

Kalau masih nggak bunyi juga, screenshot-in kode bagian `<audio>` kamu. Nanti aku debug bareng-bareng.

Kita pasti bisa bikin wedding nasheed-nya muter Zaskya! 💪💖
</audio>
    <script>
        let angkaRahasia = Math.floor(Math.random() * 10) + 1;
        let musikNyala = false;

        function sapa() {
            let nama = document.getElementById("nama").value;
            if(nama == "") { alert("Isi namamu dulu ya!"); } 
            else { alert("Halo " + nama + "! Semangat belajar IT nya ✨"); }
        }

        function hitungRapor() {
            let p = document.getElementById("pengetahuan").value;
            let k = document.getElementById("ketrampilan").value;
            if(p == "" || k == "") { alert("Isi kedua nilainya dulu!"); return; }
            let rata = (parseFloat(p) + parseFloat(k)) / 2;
            rata = rata.toFixed(2);
            let status = rata >= 90 ? "LULUS NILAI BAIK BANGET! 🌟" : "Lulus 👍";
            document.getElementById("hasil").innerHTML = "Rata-rata: " + rata + "<br>" + status;
        }

        function gantiMode() {
            document.body.classList.toggle("dark-mode");
            let tombol = document.querySelector(".btn-mode");
            if(document.body.classList.contains("dark-mode")) { tombol.innerHTML = "☀️ Mode Siang"; } 
            else { tombol.innerHTML = "🌙 Mode Malam"; }
        }

        function bikinHati() {
            const hati = document.createElement("div");
            hati.classList.add("hati");
            hati.innerHTML = "💖";
            hati.style.left = Math.random() * 100 + "vw";
            hati.style.animationDuration = Math.random() * 3 + 2 + "s";
            document.body.appendChild(hati);
            setTimeout(() => { hati.remove(); }, 5000);
        }
        setInterval(bikinHati, 300);

        // FITUR 2: MUSIK
        function playMusik() {
            let musik = document.getElementById("musikKu");
            let tombol = event.target;
            if(musikNyala == false) {
                musik.play();
                tombol.innerHTML = "⏸️ Stop";
                musikNyala = true;
            } else {
                musik.pause();
                tombol.innerHTML = "🎵 Musik";
                musikNyala = false;
            }
        }

        // FITUR 4: GAME TEBAK ANGKA
        function tebakAngka() {
            let tebakan = document.getElementById("tebakan").value;
            let hasil = document.getElementById("hasilGame");
            if(tebakan == "") { alert("Isi tebakanmu dulu!"); return; }
            
            if(tebakan == angkaRahasia) {
                hasil.innerHTML = "BENAR! Kamu jago 🎉 Angkanya " + angkaRahasia;
                hasil.style.color = "#32cd32";
                angkaRahasia = Math.floor(Math.random() * 10) + 1; // Reset angka
            } else if(tebakan > angkaRahasia) {
                hasil.innerHTML = "Kekecilan! Coba lagi 👇";
                hasil.style.color = "#ff1493";
            } else {
                hasil.innerHTML = "Kegedean! Coba lagi 👆";
                hasil.style.color = "#ff1493";
            }
        }
    </script>
</body>
</html>
